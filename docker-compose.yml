services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - ai-server
    networks:
      - segmentation-network

  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: segment-ai:latest
    container_name: segment-ai
    environment:
      - PORT=8001
      - TORCH_HOME=/app/models
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./server/models:/app/models
      - ./hf_cache:/root/.cache/huggingface
    networks:
      - segmentation-network

networks:
  segmentation-network:
    driver: bridge