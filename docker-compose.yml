services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - ai-server
    networks:
      - segmentation-network

  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: segment-ai:latest
    container_name: segment-ai
    environment:
      - HF_HOME=/root/.cache/huggingface   # указываем путь к кешу
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./hf_cache:/root/.cache/huggingface   # монтируем скачанные модели
      # опционально: для быстрой правки кода без пересборки:
      # - ./server/app.py:/app/app.py
    networks:
      - segmentation-network

networks:
  segmentation-network:
    driver: bridge